<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambling Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-title">OUTR Gamblers</div>
    </div>
    <script>
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
        }, 1500); // Now disappears after 1.5 seconds
    </script>
    
        

    <div class="container">
        <h1 class="title">OUTR GAMBLERS</h1>

        <div class="section">
            <h2>Add a Bet</h2>
            <div class="form-group">
                <input type="text" id="name" placeholder="Name" class="input">
                <input type="number" id="betAmount" placeholder="Bet Amount" class="input">
                <select id="team" class="input">
                    <option value="A">Team A</option>
                    <option value="B">Team B</option>
                </select>
                <button id="addBet" class="button">Add Bet</button>
            </div>
        </div>

        <div class="section">
            <h2>Current Bets</h2>
            <ul id="betList" class="list"></ul>
        </div>

        <!-- All Bets Table -->
        <div class="section">
            <h2>All Bets</h2>
            <table id="betsTable" class="table"></table>
        </div>

        <div class="section">
            <h2>Set Profit Percentage</h2>
            <input type="number" id="profitPercentage" value="10" class="input short-input"> %
        </div>

        <div class="section">
            <h2>Calculate Winnings</h2>
            <select id="winner" class="input">
                <option value="">Select Winning Team</option>
                <option value="A">Team A</option>
                <option value="B">Team B</option>
            </select>
            <button id="calculate" class="button">Calculate</button>
            <div class="section">
                <button style="background-color: crimson;" style="color: rgb(255, 255, 255);" id="clearAll" class="button">Clear All</button>
            </div>
            
            <div id="results" class="results">
                <h3>Results</h3>
                <p id="managementCut" class="info"></p>
                <ul id="winnersList" class="list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>


    <script src="script.js"></script>
</body>
</html>
